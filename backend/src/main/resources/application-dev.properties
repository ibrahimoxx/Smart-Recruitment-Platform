spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/recruitment_platform_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Dev-only fallback — overridden by JWT_SECRET env var in prod
app.jwt.secret=${JWT_SECRET:dev-only-secret-key-for-local-use-do-not-use-in-production-32ch}

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

logging.level.com.recruitment=${LOG_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:DEBUG}
logging.level.org.hibernate.orm.jdbc.bind=${LOG_LEVEL_HIBERNATE_BIND:TRACE}
