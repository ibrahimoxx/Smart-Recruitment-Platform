app.jwt.secret=test-only-secret-key-for-ci-not-for-production-use
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

spring.datasource.url=jdbc:h2:mem:recruitment_platform;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=PUBLIC

spring.flyway.enabled=true
spring.flyway.schemas=PUBLIC
spring.flyway.default-schema=PUBLIC
spring.flyway.clean-disabled=false

management.endpoints.web.exposure.include=health,info
management.health.mail.enabled=false

logging.level.root=WARN
logging.level.com.recruitment=INFO
