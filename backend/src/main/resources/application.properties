spring.application.name=recruitment-platform

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/recruitment_platform}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=${JPA_TIMEZONE:UTC}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.schemas=${FLYWAY_SCHEMAS:public}
spring.flyway.default-schema=${FLYWAY_DEFAULT_SCHEMA:public}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE_ON_MIGRATE:true}

app.jwt.secret=${JWT_SECRET:CHANGE_ME_SET_JWT_SECRET_ENV_VAR}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
app.jwt.issuer=${JWT_ISSUER:smart-recruitment-platform}

app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
app.minio.bucket-cv=${MINIO_BUCKET_CV:recruitment-cv}
app.minio.bucket-assets=${MINIO_BUCKET_ASSETS:recruitment-assets}
app.minio.secure=${MINIO_SECURE:false}

management.endpoints.web.base-path=${ACTUATOR_BASE_PATH:/actuator}
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_SHOW_DETAILS:when_authorized}
management.info.env.enabled=false
management.health.mail.enabled=${ACTUATOR_HEALTH_MAIL_ENABLED:false}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.recruitment=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.pattern.console=${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n}
